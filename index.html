<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animação Scroll Realista</title>
  <style>
    /* FUNDO GERAL BEM LIMPO */
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .container-principal {
      position: relative;
      width: 100%;
      max-width: 500px;
      padding: 20px;
      overflow: hidden; /* Impede que os cartões vazem da tela */
    }

    /* O TRILHO DOS CARTÕES (Aqui entra a nova animação que move os itens) */
    .trilho-cartoes {
      display: flex;
      gap: 15px;
      /* Animação com o mesmo tempo da mãozinha */
      animation: moverCartoes 2.5s infinite ease-in-out;
    }

    /* OS CARTÕES (Estilo Wireframe do print) */
    .cartao {
      min-width: 160px;
      height: 100px;
      background: #ffffff;
      border: 2px solid #888888;
      border-radius: 12px;
    }

    /* A ANIMAÇÃO DA MÃO E DA SOMBRA */
    .animacao-mao {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }

    /* Sombra do clique */
    .sombra-clique {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      top: 10px;
      left: 5px;
      animation: piscarSombra 2.5s infinite ease-in-out;
    }

    /* Ícone da mão em SVG */
    .icone-mao {
      width: 60px;
      height: 60px;
      transform-origin: bottom right;
      animation: cliqueEArraste 2.5s infinite ease-in-out;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2)); 
    }

    /* KEYFRAMES: Mão Aparece > Clica > Arrasta (-100px) > Solta */
    @keyframes cliqueEArraste {
      0% { transform: translateX(50px) scale(1); opacity: 0; }
      15% { transform: translateX(50px) scale(1); opacity: 1; }
      25% { transform: translateX(50px) scale(0.85); opacity: 1; } /* CLICA */
      70% { transform: translateX(-50px) scale(0.85); opacity: 1; } /* ARRASTA */
      80% { transform: translateX(-50px) scale(1); opacity: 0; } /* SOLTA */
      100% { transform: translateX(50px) scale(1); opacity: 0; }
    }

    /* KEYFRAMES: Os cartões se movem EXATAMENTE junto com a mão (-100px) */
    @keyframes moverCartoes {
      0%, 25% { transform: translateX(0); } /* Parado antes do clique da mão */
      70%, 80% { transform: translateX(-100px); } /* Move para o lado junto com a mão */
      100% { transform: translateX(0); } /* Volta para o início discretamente */
    }

    /* KEYFRAMES: Sombra do clique */
    @keyframes piscarSombra {
      0%, 15% { opacity: 0; transform: scale(0.5); }
      25%, 70% { opacity: 1; transform: scale(1.2); }
      80%, 100% { opacity: 0; transform: scale(0.5); }
    }
  </style>
</head>
<body>

  <div class="container-principal">
    
    <div class="trilho-cartoes">
      <div class="cartao"></div>
      <div class="cartao"></div>
      <div class="cartao"></div>
      <div class="cartao"></div>
      <div class="cartao"></div>
    </div>

    <div class="animacao-mao">
      <div class="sombra-clique"></div>
      <svg class="icone-mao" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffffff" stroke="#333333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 10.5V6.5a2.5 2.5 0 0 0-5 0v6M10.5 16.5l-2-2a2 2 0 0 0-2.83 2.83l3.83 3.83a4 4 0 0 0 2.83 1.17h2.34a4 4 0 0 0 3.8-2.73l1.5-4.5a2 2 0 0 0-1.9-2.6h-3.07"></path>
      </svg>
    </div>

  </div>

</body>
</html>
